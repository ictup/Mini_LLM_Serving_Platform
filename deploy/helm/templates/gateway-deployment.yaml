apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "gateway") | indent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
{{ include "mini-llm.componentLabels" (dict "name" "gateway") | indent 8 }}
    spec:
      containers:
        - name: gateway
          image: {{ .Values.gateway.image | quote }}
          imagePullPolicy: {{ .Values.gateway.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.service.port }}
          envFrom:
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: {{ include "mini-llm.gatewaySecretName" . }}
          resources:
{{ toYaml .Values.gateway.resources | indent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
