{{- if .Values.mockBackend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-backend
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "mock-backend") | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-backend
  template:
    metadata:
      labels:
{{ include "mini-llm.componentLabels" (dict "name" "mock-backend") | indent 8 }}
    spec:
      containers:
        - name: mock-backend
          image: {{ .Values.mockBackend.image | quote }}
          imagePullPolicy: {{ .Values.mockBackend.imagePullPolicy }}
          command: ["uvicorn"]
          args:
            - serving.mock_backend.app:app
            - --host
            - 0.0.0.0
            - --port
            - {{ .Values.mockBackend.service.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.mockBackend.service.port }}
          livenessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mock-backend
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "mock-backend") | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mock-backend
  ports:
    - name: http
      port: {{ .Values.mockBackend.service.port }}
      targetPort: http
{{- end }}
