{{- if .Values.gateway.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "gateway") | indent 4 }}
  annotations:
{{ toYaml .Values.gateway.ingress.annotations | indent 4 }}
spec:
  ingressClassName: {{ .Values.gateway.ingress.className | quote }}
  {{- if .Values.gateway.ingress.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.gateway.ingress.host | quote }}
      secretName: {{ .Values.gateway.ingress.tlsSecretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.gateway.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: {{ .Values.gateway.service.port }}
{{- end }}
