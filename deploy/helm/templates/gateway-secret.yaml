apiVersion: v1
kind: Secret
metadata:
  name: gateway-secret
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "gateway") | indent 4 }}
type: Opaque
stringData:
  API_KEYS: {{ .Values.gateway.apiKeys | quote }}
  {{- if .Values.vllm.enabled }}
  VLLM_API_KEY: {{ .Values.vllm.apiKey | quote }}
  {{- end }}
