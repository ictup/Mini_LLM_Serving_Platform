{{- if .Values.vllm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "vllm") | indent 4 }}
data:
  VLLM_MODEL: {{ .Values.vllm.model | quote }}
  VLLM_DTYPE: {{ .Values.vllm.dtype | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: vllm-secret
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "vllm") | indent 4 }}
type: Opaque
stringData:
  VLLM_API_KEY: {{ .Values.vllm.apiKey | quote }}
  HUGGING_FACE_HUB_TOKEN: {{ .Values.vllm.huggingFaceHubToken | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "vllm") | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
{{ include "mini-llm.componentLabels" (dict "name" "vllm") | indent 8 }}
    spec:
      containers:
        - name: vllm
          image: {{ .Values.vllm.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - $(VLLM_MODEL)
            - --host
            - 0.0.0.0
            - --port
            - {{ .Values.vllm.service.port | quote }}
            - --api-key
            - $(VLLM_API_KEY)
            - --dtype
            - $(VLLM_DTYPE)
            - --disable-log-requests
          envFrom:
            - configMapRef:
                name: vllm-config
            - secretRef:
                name: vllm-secret
          ports:
            - name: http
              containerPort: {{ .Values.vllm.service.port }}
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.vllm.gpu | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "vllm") | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - name: http
      port: {{ .Values.vllm.service.port }}
      targetPort: http
{{- end }}
