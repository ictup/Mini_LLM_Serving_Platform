apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "mini-llm.componentLabels" (dict "name" "gateway") | indent 4 }}
data:
  APP_NAME: mini-llm-serving-platform
  ENV: helm
  LOG_LEVEL: {{ .Values.gateway.logLevel | quote }}
  RATE_LIMIT_ENABLED: {{ .Values.gateway.rateLimit.enabled | quote }}
  RATE_LIMIT_RPM: {{ .Values.gateway.rateLimit.rpm | quote }}
  RATE_LIMIT_TPM: {{ .Values.gateway.rateLimit.tpm | quote }}
  RATE_LIMIT_CONCURRENT_REQUESTS: {{ .Values.gateway.rateLimit.concurrentRequests | quote }}
  RATE_LIMIT_DEFAULT_COMPLETION_TOKENS: {{ .Values.gateway.rateLimit.defaultCompletionTokens | quote }}
  {{- if .Values.vllm.enabled }}
  RATE_LIMIT_TOKENIZER_PROFILES_JSON: {{ printf "{\"qwen-small\":\"qwen2\",\"%s\":\"qwen2\"}" .Values.vllm.model | quote }}
  {{- else }}
  RATE_LIMIT_TOKENIZER_PROFILES_JSON: {{ .Values.gateway.rateLimit.tokenizerProfilesJson | quote }}
  {{- end }}
  RATE_LIMIT_TOKENIZER_PATHS_JSON: {{ .Values.gateway.rateLimit.tokenizerPathsJson | quote }}
  REDIS_URL: redis://redis:{{ .Values.redis.service.port }}/0
  MAX_REQUEST_BODY_BYTES: {{ .Values.gateway.requestLimits.maxBodyBytes | int | quote }}
  MAX_CHAT_MESSAGES: {{ .Values.gateway.requestLimits.maxChatMessages | int | quote }}
  MAX_CHAT_MESSAGE_CHARS: {{ .Values.gateway.requestLimits.maxChatMessageChars | int | quote }}
  MAX_CHAT_TOTAL_MESSAGE_CHARS: {{ .Values.gateway.requestLimits.maxChatTotalMessageChars | int | quote }}
  METRICS_ENABLED: "true"
  {{- if .Values.vllm.enabled }}
  BACKEND_TYPE: vllm
  VLLM_BASE_URL: http://vllm:{{ .Values.vllm.service.port }}/v1
  DEFAULT_MODEL: qwen-small
  MODEL_ALIASES_JSON: {{ printf "{\"qwen-small\":\"%s\"}" .Values.vllm.model | quote }}
  MODEL_ROUTES_JSON: {{ .Values.gateway.modelRoutesJson | quote }}
  {{- else }}
  BACKEND_TYPE: mock
  MOCK_BASE_URL: http://mock-backend:{{ .Values.mockBackend.service.port }}/v1
  DEFAULT_MODEL: mock
  MODEL_ALIASES_JSON: {{ .Values.gateway.modelAliasesJson | quote }}
  MODEL_ROUTES_JSON: {{ .Values.gateway.modelRoutesJson | quote }}
  {{- end }}
