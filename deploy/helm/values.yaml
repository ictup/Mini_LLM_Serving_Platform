namespace:
  create: true
  name: mini-llm-serving

gateway:
  replicas: 1
  image: mini-llm-serving-platform:local
  imagePullPolicy: IfNotPresent
  apiKeys: dev-key,team-a-key
  existingSecretName: ""
  logLevel: INFO
  rateLimit:
    enabled: true
    rpm: 60
    tpm: 60000
    concurrentRequests: 20
    defaultCompletionTokens: 256
  requestLimits:
    maxBodyBytes: 1048576
    maxChatMessages: 64
    maxChatMessageChars: 16000
    maxChatTotalMessageChars: 64000
  service:
    port: 8080
  modelAliasesJson: '{"mock":"mock","qwen-small":"mock"}'
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: false
    className: nginx
    host: mini-llm.local
    tlsSecretName: mini-llm-serving-tls
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "1m"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

mockBackend:
  enabled: true
  image: mini-llm-serving-platform:local
  imagePullPolicy: IfNotPresent
  service:
    port: 9000

redis:
  enabled: true
  image: redis:7-alpine
  service:
    port: 6379

prometheus:
  enabled: true
  image: prom/prometheus:v2.55.1
  scrapeInterval: 5s
  service:
    port: 9090

vllm:
  enabled: false
  image: vllm/vllm-openai:v0.8.5.post1
  model: Qwen/Qwen2.5-0.5B-Instruct
  apiKey: local-vllm-key
  existingSecretName: ""
  dtype: float16
  maxModelLen: 4096
  gpuMemoryUtilization: 0.75
  swapSpace: 1
  useV1: "0"
  huggingFaceHubToken: ""
  gpu: 1
  startupProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  service:
    port: 8000
