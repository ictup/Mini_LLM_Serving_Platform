apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mini-llm-serving
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 30s

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: gateway
        metrics_path: /metrics
        static_configs:
          - targets:
              - gateway:8080

      - job_name: vllm
        metrics_path: /metrics
        static_configs:
          - targets:
              - vllm:8000

      - job_name: dcgm-exporter
        metrics_path: /metrics
        static_configs:
          - targets:
              - dcgm-exporter:9400
