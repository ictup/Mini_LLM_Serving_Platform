apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: mini-llm-serving
data:
  BACKEND_TYPE: vllm
  VLLM_BASE_URL: http://vllm:8000/v1
  DEFAULT_MODEL: qwen-small
  MODEL_ALIASES_JSON: '{"qwen-small":"Qwen/Qwen2.5-0.5B-Instruct"}'
  RATE_LIMIT_TOKENIZER_PROFILES_JSON: '{"qwen-small":"qwen2","Qwen/Qwen2.5-0.5B-Instruct":"qwen2"}'
