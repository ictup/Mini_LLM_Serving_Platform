apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mini-llm-serving
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: mini-llm-serving-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: gateway
        metrics_path: /metrics
        static_configs:
          - targets:
              - gateway:8080
