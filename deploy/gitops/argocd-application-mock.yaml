apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mini-llm-serving-mock
  namespace: argocd
  labels:
    app.kubernetes.io/name: mini-llm-serving
    app.kubernetes.io/part-of: mini-llm-serving-platform
spec:
  project: default
  source:
    repoURL: https://github.com/ictup/Mini_LLM_Serving_Platform.git
    targetRevision: main
    path: deploy/helm
    helm:
      releaseName: mini-llm
      valuesObject:
        namespace:
          create: true
          name: mini-llm-serving
        gateway:
          image: ghcr.io/ictup/mini-llm-serving-platform:main
          imagePullPolicy: IfNotPresent
          existingSecretName: gateway-secret
          autoscaling:
            enabled: true
            minReplicas: 1
            maxReplicas: 3
        mockBackend:
          enabled: true
          image: ghcr.io/ictup/mini-llm-serving-platform:main
          imagePullPolicy: IfNotPresent
        prometheus:
          enabled: true
          alerting:
            enabled: true
        vllm:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: mini-llm-serving
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
