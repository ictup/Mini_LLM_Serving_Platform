services:
  gateway:
    environment:
      BACKEND_TYPE: vllm
      VLLM_BASE_URL: http://vllm:8000/v1
      VLLM_API_KEY: ${VLLM_API_KEY:-local-vllm-key}
      DEFAULT_MODEL: qwen-small
      MODEL_ALIASES_JSON: '{"qwen-small":"${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}"}'
    depends_on:
      vllm:
        condition: service_healthy
      redis:
        condition: service_started

  vllm:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-v0.8.5.post1}
    ipc: host
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      VLLM_USE_V1: ${VLLM_USE_V1:-0}
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - ${VLLM_API_KEY:-local-vllm-key}
      - --dtype
      - ${VLLM_DTYPE:-float16}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-4096}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.75}
      - --swap-space
      - ${VLLM_SWAP_SPACE:-1}
      - --disable-frontend-multiprocessing
      - --disable-log-requests
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 10s
      timeout: 6s
      retries: 60
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]

  prometheus:
    volumes:
      - ./monitoring/prometheus/prometheus.gpu.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      gateway:
        condition: service_started
      vllm:
        condition: service_started
