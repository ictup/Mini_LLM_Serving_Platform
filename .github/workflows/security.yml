name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run pip-audit
        run: uv run --with pip-audit pip-audit --strict

  repository-scan:
    name: Repository and IaC scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Trivy repository scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-repository.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload repository SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-repository-sarif
          path: trivy-repository.sarif
          if-no-files-found: warn

  image-scan:
    name: Container image scan and SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          load: true
          tags: mini-llm-serving-platform:security-scan

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: mini-llm-serving-platform:security-scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload image SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif
          if-no-files-found: warn

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: mini-llm-serving-platform:security-scan
          format: cyclonedx
          output: sbom-cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-llm-serving-platform-sbom
          path: sbom-cyclonedx.json
