name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run ruff
        run: uv run ruff check .

      - name: Run pytest
        run: uv run pytest

  helm:
    name: Helm chart
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.2.0

      - name: Lint chart
        run: helm lint deploy/helm

      - name: Render default stack
        run: helm template mini-llm deploy/helm --namespace mini-llm-serving

      - name: Render vLLM stack
        run: >
          helm template mini-llm deploy/helm
          --namespace mini-llm-serving
          --set vllm.enabled=true
          --set mockBackend.enabled=false
